<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高質量下載連結</title>
    <style>
        
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 50px;
            background-color: #f9f9f9;
            
            font-size: 24px; 
        }

        h1 {
          
            font-size: 48px; 
            color: #333;
        }

        p {
            
            font-size: 24px;
            color: #666;
            line-height: 1.6;
        }

        
        .download-btn {
            display: inline-block;
            padding: 20px 40px;
          
            font-size: 32px; 
            font-weight: bold;
            color: white;
            background-color: #007bff;
            text-decoration: none;
            border-radius: 10px;
            margin-top: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .download-btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <h1>下載區</h1>
    <p>點擊下方按鈕</p>
    
    
    <a href="my-app.apk" download class="download-btn">點我下載</a>

</body>
</html>
